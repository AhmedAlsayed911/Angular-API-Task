<div class="container mt-4" style="max-width: 620px;">
  <h2 class="mb-3">Register</h2>

  @if (errorMessage()) {
    <div class="alert alert-danger">{{ errorMessage() }}</div>
  }

  @if (message()) {
    <div class="alert alert-success">{{ message() }}</div>
  }

  <form (ngSubmit)="register()">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">First Name</label>
        <input class="form-control" [(ngModel)]="firstName" name="firstName" required />
      </div>

      <div class="col-md-6">
        <label class="form-label">Last Name</label>
        <input class="form-control" [(ngModel)]="lastName" name="lastName" required />
      </div>

      <div class="col-md-6">
        <label class="form-label">Username</label>
        <input class="form-control" [(ngModel)]="userName" name="userName" required />
      </div>

      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" [(ngModel)]="email" name="email" required />
      </div>

      <div class="col-md-12">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" [(ngModel)]="password" name="password" required />
      </div>
    </div>

    <div class="mt-3">
      <button class="btn btn-success" type="submit">Register</button>
      <a class="btn btn-link" routerLink="/login">Back to login</a>
    </div>
  </form>
</div>
